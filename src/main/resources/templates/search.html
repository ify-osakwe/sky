<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Sky — Search Results')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <form class="search-form" action="/search" method="get">
            <input type="text" name="query" th:value="${query}" placeholder="Enter city name..." required>
            <button type="submit">Search</button>
        </form>

        <div th:if="${cities != null and !cities.isEmpty()}">
            <h3 class="section-title">Results for "<span th:text="${query}">query</span>"</h3>
            <div class="row g-3 city-list">
                <div class="col-md-4" th:each="city : ${cities}">
                    <a th:href="@{/weather(name=${city.name}, country=${city.country}, lat=${city.latitude}, lon=${city.longitude}, state=${city.state})}">
                        <div class="card-custom">
                            <h5 th:text="${city.fullname}">City, State, Country</h5>
                            <p>
                                <span th:text="'Lat: ' + ${city.latitude}">Lat</span> ·
                                <span th:text="'Lon: ' + ${city.longitude}">Lon</span>
                            </p>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${cities == null or cities.isEmpty()}" class="empty-state">
            <p>No cities found for "<span th:text="${query}">query</span>"</p>
            <a th:href="@{/}" class="link-back">← Back to home</a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
