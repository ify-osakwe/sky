<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Sky — ' + ${city.fullname})}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div class="weather-header">
            <h2 th:text="${city.fullname}">City Name</h2>
            <p th:text="'Last updated: ' + ${weather.lastUpdated}">Last updated</p>
        </div>

        <!-- Current Weather -->
        <div class="card-custom mb-4">
            <div class="temperature-display" th:text="${weather.temperature} + '°'">0°</div>
            <div class="condition-display" th:text="${weather.weatherDescription}">Clear sky</div>

            <div class="row">
                <div class="col-6 col-md-3 weather-stat">
                    <span class="value" th:text="${weather.humidity} + '%'">0%</span>
                    <span class="label">Humidity</span>
                </div>
                <div class="col-6 col-md-3 weather-stat">
                    <span class="value" th:text="${weather.pressure} + ' hPa'">0 hPa</span>
                    <span class="label">Pressure</span>
                </div>
                <div class="col-6 col-md-3 weather-stat">
                    <span class="value" th:text="${weather.windSpeed} + ' m/s'">0 m/s</span>
                    <span class="label">Wind Speed</span>
                </div>
                <div class="col-6 col-md-3 weather-stat">
                    <span class="value" th:text="${weather.weatherMain}">Clear</span>
                    <span class="label">Conditions</span>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-6 weather-stat">
                    <span class="value" th:text="${weather.sunrise}">06:00</span>
                    <span class="label">Sunrise</span>
                </div>
                <div class="col-6 weather-stat">
                    <span class="value" th:text="${weather.sunset}">18:00</span>
                    <span class="label">Sunset</span>
                </div>
            </div>
        </div>

        <!-- Forecast -->
        <div th:if="${forecast != null and !forecast.isEmpty()}">
            <h3 class="section-title">5-Day Forecast</h3>
            <div class="card-custom">
                <table class="forecast-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Temp</th>
                            <th>Conditions</th>
                            <th>Humidity</th>
                            <th>Wind</th>
                            <th>Rain</th>
                            <th>Precip. %</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${forecast}">
                            <td th:text="${#temporals.format(item.forecastDate, 'yyyy-MM-dd HH:mm:ss')}">2026-01-01</td>
                            <td th:text="${item.temperature} + '°'">0°</td>
                            <td th:text="${item.weatherMain}">Clear</td>
                            <td th:text="${item.humidity} + '%'">0%</td>
                            <td th:text="${item.windSpeed} + ' m/s'">0 m/s</td>
                            <td th:text="${item.rainVolume != null ? item.rainVolume + ' mm' : '-'}">-</td>
                            <td th:text="${item.precipitationProbability != null ? item.precipitationProbability + '%' : '-'}">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <a th:href="@{/}" class="link-back">← Search another city</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
