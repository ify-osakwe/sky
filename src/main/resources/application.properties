spring.application.name=sky

spring.config.import=optional:file:.env[.properties]

# logging.level.root=ERROR

logging.level.github.com.ifyosakwe.sky=DEBUG
logging.level.org.springframework.web=ERROR

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

openweathermap.api.key=${OPENWEATHERMAP_API_KEY}
openweathermap.api.base-url=https://api.openweathermap.org/data/2.5
openweathermap.api.geo-url=http://api.openweathermap.org/geo/1.0/direct

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=github.com.ifyosakwe.sky.controller
springdoc.paths-to-match=/api/**
